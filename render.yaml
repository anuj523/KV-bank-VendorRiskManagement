services:
  - type: web
    name: vendor-risk360-api
    env: node
    region: singapore
    plan: standard
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vendor-risk360-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: vendor-risk360-frontend
    env: static
    region: singapore
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: vendor-risk360-db
    region: singapore
    plan: starter
    databaseName: vendorrisk360
    user: vendorrisk360
